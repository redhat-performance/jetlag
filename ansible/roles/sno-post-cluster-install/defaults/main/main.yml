---
# sno-post-cluster-install default vars

# This will be your bastion machine (if you run setup-bastion playbook)
assisted_installer_host: "{{ groups['bastion'][0] }}"
assisted_installer_port: 8090

# Wait until cluster is stable vars
wait_until_cluster_stable: true
minimum_stable_period: 2m
wait_until_cluster_stable_timeout: 20m

# Remove assisted-installer namespace from cluster after installation
remove_assisted_installer_namespace: false

# Deploy openshift-gitops-operator
setup_openshift_gitops: false
gitops_channel: stable

# Minio deployment is an object storage pod for use with ACM
setup_minio: false
minio_image_tag: RELEASE.2025-09-07T16-13-09Z
minio_pv_storageclass: localstorage2-sc

# setup metal3
sno_metal3: false

# Apply the cluster-monitoring-config that uses the localstorage class name created
# by controlplane_localstorage_configuration
apply_cluster_monitoring_config: false

# Prometheus storage settings
prometheus_retention_period: 15d
prometheus_storage_class: localstorage-sc
prometheus_storage_size: 50Gi

# DU Profile
du_profile: false

# Performance-addon-operator and du profile vars
install_performance_addon_operator: false
hugepages_count: 16
node: 0
isolated_cpus: 2-47,50-95

# Additional labels to apply to all nodes post-install (list of key=value or key= strings)
post_install_node_labels:
  - jetlag=true
