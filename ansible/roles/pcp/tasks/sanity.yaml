---
- name: Check if only one role is selected
  ansible.builtin.fail:
    msg: "Please only select either server or a client role, not both"
  when:
    - pcp_install_server | bool
    - pcp_install_client | bool

- name: Check if there are hosts to configure
  when:
   - pcp_server_configure_clients | bool
   - groups['hv'] is defined
   - groups['hv'] | length == 0
  ansible.builtin.fail:
    msg: "Configuration is set to configure clients, but HV group is empty"
