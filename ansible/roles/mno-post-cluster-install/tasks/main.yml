---
# mno-post-cluster-install tasks

- name: Create directories for mno cluster configuration items
  file:
    path: "{{ item }}"
    state: directory
  loop:
    - "{{ bastion_cluster_config_dir }}"
    - "{{ bastion_cluster_config_dir }}/aap"
    - "{{ bastion_cluster_config_dir }}/catalogsources"
    - "{{ bastion_cluster_config_dir }}/gitops"
    - "{{ bastion_cluster_config_dir }}/localstorage"
    - "{{ bastion_cluster_config_dir }}/minio"
    - "{{ bastion_cluster_config_dir }}/odf"
    - "{{ bastion_cluster_config_dir }}/openshift-monitoring"

- name: Get credentials (kubeconfig and kubeadmin password) from installed cluster
  get_url:
    url: "http://{{ assisted_installer_host }}:{{ assisted_installer_port }}/api/assisted-install/v2/clusters/{{ ai_cluster_id }}/downloads/credentials?file_name={{ item.name }}"
    dest: "{{ bastion_cluster_config_dir }}/{{ item.dest }}"
  loop:
    - name: kubeadmin-password
      dest: kubeadmin-password
    - name: kubeconfig
      dest: kubeconfig
    - name: kubeconfig
      dest: kubeconfig.backup

- name: Wait until cluster is stable
  shell: |
    KUBECONFIG={{ bastion_cluster_config_dir }}/kubeconfig oc adm wait-for-stable-cluster --minimum-stable-period={{ minimum_stable_period }} --timeout={{ wait_until_cluster_stable_timeout }}
  when: wait_until_cluster_stable

- name: Remove assisted-installer namespace
  shell: |
    KUBECONFIG={{ bastion_cluster_config_dir }}/kubeconfig oc delete ns assisted-installer
  when: remove_assisted_installer_namespace

- name: Apply post-install labels to worker node(s)
  shell: |
    KUBECONFIG={{ bastion_cluster_config_dir }}/kubeconfig oc label no --overwrite -l node-role.kubernetes.io/worker {{ item }}
  loop: "{{ post_install_node_labels }}"

- name: Place templated configuration items
  template:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
  loop:
    - src: ansible-automation-platform-operator.yml.j2
      dest: "{{ bastion_cluster_config_dir }}/aap/ansible-automation-platform-operator.yml"
    - src: openshift-gitops-operator.yml.j2
      dest: "{{ bastion_cluster_config_dir }}/gitops/openshift-gitops-operator.yml"
    - src: localstorage.yml.j2
      dest: "{{ bastion_cluster_config_dir }}/localstorage/localstorage.yml"
    - src: localvolume-lvm.yml.j2
      dest: "{{ bastion_cluster_config_dir }}/localstorage/localvolume-lvm.yml"
    - src: localvolume-disk.yml.j2
      dest: "{{ bastion_cluster_config_dir }}/localstorage/localvolume-disk.yml"
    - src: minio.yml.j2
      dest: "{{ bastion_cluster_config_dir }}/minio/minio.yml"
    - src: odf.yml.j2
      dest: "{{ bastion_cluster_config_dir }}/odf/odf.yml"
    - src: odf-storagecluster.yml.j2
      dest: "{{ bastion_cluster_config_dir }}/odf/odf-storagecluster.yml"
    - src: cluster-monitoring-config.yml.j2
      dest: "{{ bastion_cluster_config_dir }}/openshift-monitoring/cluster-monitoring-config.yml"
    - src: catalogsource.yml.j2
      dest: "{{ bastion_cluster_config_dir }}/catalogsources/catalogsource.yml"

- name: Clone performance-dashboards
  git:
    repo: https://github.com/cloud-bulldozer/performance-dashboards.git
    dest: "{{ bastion_cluster_config_dir }}/performance-dashboards"
    force: true
    version: master
  when: setup_performance_dashboards | bool

- name: Deploy performance-dashboards
  shell: |
    export KUBECONFIG={{ bastion_cluster_config_dir }}/kubeconfig
    {{ bastion_cluster_config_dir }}/performance-dashboards/dittybopper/deploy.sh
  args:
    chdir: "{{ bastion_cluster_config_dir }}/performance-dashboards/dittybopper/"
  when: setup_performance_dashboards | bool

- name: Add kube-burner sa
  shell: |
    KUBECONFIG={{ bastion_cluster_config_dir }}/kubeconfig oc create sa kubeburner
  when: setup_kube_burner_sa | default(true) | bool

- name: Add cluster-admin role to kube-burner sa
  shell: |
    KUBECONFIG={{ bastion_cluster_config_dir }}/kubeconfig oc adm policy add-cluster-role-to-user -z kubeburner cluster-admin
  when: setup_kube_burner_sa | default(true) | bool

- name: Disable default OperatorHub sources on bastion registry clusters
  shell: |
    KUBECONFIG={{ bastion_cluster_config_dir }}/kubeconfig oc patch OperatorHub cluster --type json -p '[{"op": "add", "path": "/spec/disableAllDefaultSources", "value": true}]'
  when: use_bastion_registry | default(false)

- name: Apply oc mirror ImageDigestMirrorSet on bastion registry clusters
  shell: |
    KUBECONFIG={{ bastion_cluster_config_dir }}/kubeconfig oc apply -f {{ sync_path }}/operators/{{ operator_index_name }}/working-dir/cluster-resources/idms-oc-mirror.yaml
  when: use_bastion_registry | default(false)

- name: Apply ImageTagMirrorSet on bastion registry clusters
  shell: |
    cat <<EOF | KUBECONFIG={{ bastion_cluster_config_dir }}/kubeconfig oc apply -f -
    apiVersion: config.openshift.io/v1
    kind: ImageTagMirrorSet
    metadata:
      name: {{ item.dest | replace('/', '-') }}-mirror
    spec:
      imageTagMirrors:
      - mirrors:
        - {{ registry_host }}:{{ registry_port }}/{{ item.dest }}
        source: {{ item.source }}
    EOF
  loop: "{{ image_tag_mirrors | default([]) }}"
  when: use_bastion_registry | default(false)
- name: Apply oc mirror catalogSource on bastion registry clusters
  shell: |
    KUBECONFIG={{ bastion_cluster_config_dir }}/kubeconfig oc apply -f {{ sync_path }}/operators/{{ operator_index_name }}/working-dir/cluster-resources/{{ generated_operator_index_name_tag }}.yaml
  when: use_bastion_registry | default(false)

- name: Apply custom CatalogSources
  shell: |
    KUBECONFIG={{ bastion_cluster_config_dir }}/kubeconfig oc apply -f {{ bastion_cluster_config_dir }}/catalogsources/catalogsource.yml
  when: custom_catalogsources | length > 0

- name: Install Ansible-Automation-Platform-operator
  shell: |
    KUBECONFIG={{ bastion_cluster_config_dir }}/kubeconfig oc apply -f {{ bastion_cluster_config_dir }}/aap/ansible-automation-platform-operator.yml
  when: setup_ansible_automation_platform

- name: Install OpenShift-gitops-operator
  shell: |
    KUBECONFIG={{ bastion_cluster_config_dir }}/kubeconfig oc apply -f {{ bastion_cluster_config_dir }}/gitops/openshift-gitops-operator.yml
  when: setup_openshift_gitops

- name: Setup Local Storage Operator (LSO)
  when: setup_lso | bool
  block:
  - name: Install Local Storage Operator (LSO)
    shell:
      KUBECONFIG={{ bastion_cluster_config_dir }}/kubeconfig oc apply -f {{ bastion_cluster_config_dir }}/localstorage/localstorage.yml

  - name: Label control-plane nodes for localstorage
    when: controlplane_localstorage_lvm_devices | length > 0 or controlplane_localstorage_disk_devices | length > 0
    shell: |
      KUBECONFIG={{ bastion_cluster_config_dir }}/kubeconfig oc label no --overwrite {{ item }} localstorage=true
    loop: "{{ groups['controlplane'] }}"

  - name: Label worker nodes for localstorage
    when: worker_localstorage_lvm_devices | length > 0 or worker_localstorage_disk_devices | length > 0
    shell: |
      KUBECONFIG={{ bastion_cluster_config_dir }}/kubeconfig oc label no --overwrite {{ item }} localstorage=true
    loop: "{{ groups['worker'] }}"

  # The localvolume resource will not be instantly available, thus retry for around 2 minutes
  - name: Create localvolume-lvm resource
    when: (controlplane_localstorage_lvm_devices | length > 0) or (worker_localstorage_lvm_devices | length > 0)
    shell:
      KUBECONFIG={{ bastion_cluster_config_dir }}/kubeconfig oc apply -f {{ bastion_cluster_config_dir }}/localstorage/localvolume-lvm.yml
    register: lv_result
    until: not lv_result.failed
    retries: 60
    delay: 2

  - name: Create localvolume-disk resource
    when: (controlplane_localstorage_disk_devices | length > 0) or (worker_localstorage_disk_devices | length > 0)
    shell:
      KUBECONFIG={{ bastion_cluster_config_dir }}/kubeconfig oc apply -f {{ bastion_cluster_config_dir }}/localstorage/localvolume-disk.yml
    register: lv_result
    until: not lv_result.failed
    retries: 60
    delay: 2

- name: Setup OpenShift Data Foundation (ODF)
  when: setup_odf | bool
  block:
  - name: Install ODF operator (namespace, operatorgroup, subscription)
    shell:
      KUBECONFIG={{ bastion_cluster_config_dir }}/kubeconfig oc apply -f {{ bastion_cluster_config_dir }}/odf/odf.yml

  # The StorageCluster CRD is not available until the ODF operator finishes installing; retry for ~15 minutes
  - name: Create ODF StorageCluster
    shell:
      KUBECONFIG={{ bastion_cluster_config_dir }}/kubeconfig oc apply -f {{ bastion_cluster_config_dir }}/odf/odf-storagecluster.yml
    register: sc_result
    until: not sc_result.failed
    retries: 60
    delay: 15

  - name: Wait for ODF StorageCluster to be Ready
    shell: |
      KUBECONFIG={{ bastion_cluster_config_dir }}/kubeconfig oc wait storagecluster/ocs-storagecluster -n openshift-storage --for=jsonpath='{.status.phase}'=Ready --timeout={{ wait_for_odf_storagecluster_ready_timeout }}
    when: wait_for_odf_storagecluster_ready | bool

- name: Setup Minio
  when: setup_minio | bool
  shell: |
    KUBECONFIG={{ bastion_cluster_config_dir }}/kubeconfig oc apply -f {{ bastion_cluster_config_dir }}/minio/minio.yml

- name: Migrate ingresscontrollers (OpenShift Router) to master nodes
  when: migrate_ingresscontrollers | bool
  shell: |
    KUBECONFIG={{ bastion_cluster_config_dir }}/kubeconfig oc patch ingresscontrollers/default --type merge -n openshift-ingress-operator -p '{"spec": {"nodePlacement": {"nodeSelector": {"matchLabels": {"node-role.kubernetes.io/master": "" }}, "tolerations": [{"effect": "NoSchedule", "key": "node-role.kubernetes.io/master"}]} }}'

- name: Apply OpenShift-Monitoring configuration options
  when: (migrate_monitoring | bool) or ((apply_cluster_monitoring_config | bool) and (setup_lso | bool))
  shell:
    KUBECONFIG={{ bastion_cluster_config_dir }}/kubeconfig oc apply -f {{ bastion_cluster_config_dir }}/openshift-monitoring/cluster-monitoring-config.yml
