- name: Cleaning up grafana server
  block:
    - name: Check if grafana quadlet configured
      ansible.builtin.command: systemctl is-enabled {{ hv_metrics_grafana_container_name }}.service
      ignore_errors: true
      register: grafana_quadlet_status

    - name: Check if grafana quadlet is running
      when: grafana_quadlet_status.stdout != 'not-found'
      ansible.builtin.command: systemctl is-active {{ hv_metrics_grafana_container_name }}.service
      ignore_errors: true
      register: grafana_quadlet_active_status

    - name: Stop grafana quadlet
      when: grafana_quadlet_active_status.stdout == 'active'
      ansible.builtin.systemd:
        name: "{{ hv_metrics_grafana_container_name }}.service"
        state: stopped

    - name: Disable grafana quadlet
      when: grafana_quadlet_status.stdout == 'enabled'
      ansible.builtin.systemd:
        name: "{{ hv_metrics_grafana_container_name }}.service"
        enabled: false

    - name: Remove grafana quadlet
      when: grafana_quadlet_status.stdout != 'not-found'
      ansible.builtin.file:
        path: "{{ hv_metrics_quadlet_dir }}/{{ hv_metrics_grafana_container_name }}.container"
        state: absent

