- name: Cleaning up hv-metrics pod
  block:
    - name: Check if hv-metrics pod quadlet configured
      ansible.builtin.command: systemctl is-enabled {{ hv_metrics_pod_name }}.service
      ignore_errors: true
      register: hv_metrics_pod_quadlet_status

    - name: Check if hv-metrics pod quadlet is running
      when: hv_metrics_pod_quadlet_status.stdout != 'not-found'
      ansible.builtin.command: systemctl is-active {{ hv_metrics_pod_name }}.service
      ignore_errors: true
      register: hv_metrics_pod_quadlet_active_status

    - name: Stop hv-metrics pod quadlet
      when: hv_metrics_pod_quadlet_active_status.stdout == 'active'
      ansible.builtin.systemd:
        name: "{{ hv_metrics_pod_name }}.service"
        state: stopped

    - name: Disable hv-metrics pod quadlet
      when: hv_metrics_pod_quadlet_status.stdout == 'enabled'
      ansible.builtin.systemd:
        name: "{{ hv_metrics_pod_name }}.service"
        enabled: false

    - name: Remove hv-metrics pod quadlet
      when: hv_metrics_pod_quadlet_status.stdout != 'not-found'
      ansible.builtin.file:
        path: "{{ hv_metrics_quadlet_dir }}/{{ hv_metrics_pod_name }}.pod"
        state: absent
    
    - name: Remove hv-metrics pod kube configuration
      when: hv_metrics_pod_type == "kube"
      ansible.builtin.file:
        path: "{{ hv_metrics_quadlet_dir }}/{{ hv_metrics_pod_name }}.kube"
        state: absent

    - name: Remove hv-metrics pod definition
      when: hv_metrics_pod_type == "kube"
      ansible.builtin.file:
        path: "{{ hv_metrics_quadlet_dir }}/{{ hv_metrics_pod_name }}.yaml"
        state: absent

- name: Cleaning up prometheus client
  block:
    - name: Check if nodexporter quadlet configured
      ansible.builtin.command: systemctl is-enabled {{ hv_metrics_node_exporter_container_name }}.service
      ignore_errors: true
      register: nodexporter_quadlet_status

    - name: Check if nodexporter quadlet is running
      when: not nodexporter_quadlet_status.stdout == 'not-found'
      ansible.builtin.command: systemctl is-active {{ hv_metrics_node_exporter_container_name }}.service
      ignore_errors: true
      register: nodexporter_quadlet_active_status

    - name: Stop nodexporter quadlet
      when: nodexporter_quadlet_active_status.stdout == 'active'
      ansible.builtin.systemd:
        name: "{{ hv_metrics_node_exporter_container_name }}.service"
        state: stopped

    - name: Disable nodexporter quadlet
      when: nodexporter_quadlet_status.stdout == 'enabled'
      ansible.builtin.systemd:
        name: "{{ hv_metrics_node_exporter_container_name }}.service"
        enabled: false

    - name: Remove nodexporter quadlet
      when: not nodexporter_quadlet_status.stdout == 'not-found'
      ansible.builtin.file:
        path: "{{ hv_metrics_quadlet_dir }}/{{ hv_metrics_node_exporter_container_name }}.container"
        state: absent

- name: Cleanup working directory
  when: not hv_metrics_cleanup_keep_work_dir | bool
  ansible.builtin.file:
    path: "{{ hv_metrics_work_dir }}"
    state: absent

- name: Remove container images
  block:
    - name: Remove prometheus container image
      ansible.builtin.command: podman rmi {{ hv_metrics_prometheus_container_name }}
      ignore_errors: true

    - name: Remove nodexporter container image
      ansible.builtin.command: podman rmi {{ hv_metrics_node_exporter_container_name }}
      ignore_errors: true

    - name: Remove grafana container image
      ansible.builtin.command: podman rmi {{ hv_metrics_grafana_container_name }}
      ignore_errors: true

- name: Reconfigure firewalld
  block:
    - name: Check if firewalld is running
      ansible.builtin.command: systemctl is-active firewalld
      ignore_errors: true
      register: hv_metrics_cleanup_firewalld_running

    - name: Remove firewalld rules
      when: hv_metrics_cleanup_firewalld_running.stdout == 'active'
      ansible.builtin.firewalld:
        port: "{{ hv_metrics_server_port }}"
        permanent: true
        immediate: true
        state: disabled

    - name: Remove firewalld rules
      when: hv_metrics_cleanup_firewalld_running.stdout == 'active'
      ansible.builtin.firewalld:
        port: "{{ hv_metrics_client_port }}"
        permanent: true
        immediate: true
        state: disabled
