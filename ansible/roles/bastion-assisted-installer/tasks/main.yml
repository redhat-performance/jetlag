---
# bastion-assisted-installer tasks

# Read the version json files off the bastion machine
# Files use a "-bastion" suffix when using the bastion registry
- name: Set assisted-installer JSON file suffix
  set_fact:
    ai_json_suffix: "{{ '-bastion' if (use_bastion_registry | default(false)) else '' }}"

- name: Obtain ocp_version data for assisted-installer
  slurp:
    src: "{{ ocp_version_path }}/assisted_service_openshift_version{{ ai_json_suffix }}.json"
  register: slurped_ai_ocp_version_raw

- name: Obtain os_images data for assisted-installer
  slurp:
    src: "{{ ocp_version_path }}/assisted_service_os_images{{ ai_json_suffix }}.json"
  register: slurped_ai_os_images_raw

- name: Obtain release_images data for assisted-installer
  slurp:
    src: "{{ ocp_version_path }}/assisted_service_release_images{{ ai_json_suffix }}.json"
  register: slurped_ai_release_images_raw

- name: Set unified assisted-installer version facts
  set_fact:
    slurped_ai_ocp_version: "{{ slurped_ai_ocp_version_raw }}"
    slurped_ai_os_images: "{{ slurped_ai_os_images_raw }}"
    slurped_ai_release_images: "{{ slurped_ai_release_images_raw }}"

- name: Ensure bastion machine is logged in to inspect image digest
  shell: |
    skopeo login -u {{ registry_user }} -p {{ registry_password }} {{ registry_host }}:{{ registry_port }}
  when: use_bastion_registry | default(false)

- name: Determine digest for assisted-installer-controller image
  shell: |
    skopeo inspect docker://{{ registry_host }}:{{ registry_port }}{{ assisted_installer_controller_image | replace('quay.io','') }} | jq -r .Digest
  register: assisted_installer_controller_image_digest
  when: use_bastion_registry | default(false)

- name: Create directories for bastion assisted-installer
  file:
    path: "{{ item }}"
    state: directory
  with_items:
  - /opt/assisted-service
  - /opt/assisted-service/data

- name: Create directory for assisted-installer database
  file:
    path: /opt/assisted-service/data/postgresql
    state: directory
    owner: "26"
    recurse: true

- name: Template out assisted-installer files
  template:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
  with_items:
  - src: onprem-environment.j2
    dest: /opt/assisted-service/onprem-environment
  - src: nginx-ui.conf
    dest: /opt/assisted-service/nginx-ui.conf

- name: Create assisted-service pod
  containers.podman.podman_pod:
    name: assisted-service
    network: host
    state: started

# On a reboot "started" state does not start an exited pod (why..idk)
- name: Ensure assisted-service pod is up
  containers.podman.podman_pod:
    name: assisted-service
    network: host
    state: restarted

- name: Create database container in assisted-service pod
  containers.podman.podman_container:
    pod: assisted-service
    network: host
    env_file: /opt/assisted-service/onprem-environment
    volume:
    - /opt/assisted-service/data/postgresql:/var/lib/pgsql:Z
    name: db
    image: "{{ assisted_postgres_image }}"
    state: started

- name: Create assisted installer GUI container in assisted-service pod
  containers.podman.podman_container:
    pod: assisted-service
    network: host
    env_file: /opt/assisted-service/onprem-environment
    volume:
    - /opt/assisted-service/nginx-ui.conf:/opt/bitnami/nginx/conf/server_blocks/nginx.conf:Z
    name: gui
    image: "{{ assisted_installer_ui_image }}"
    state: started

- name: Create assisted installer service container in assisted-service pod
  containers.podman.podman_container:
    pod: assisted-service
    network: host
    env_file: /opt/assisted-service/onprem-environment
    name: service
    image: "{{ assisted_service_image }}"
    env:
      DUMMY_IGNITION: False
    volume:
    - /etc/pki/ca-trust/extracted/pem:/etc/pki/ca-trust/extracted/pem:Z
    state: started

- name: Create assisted image service container in assisted-service pod
  containers.podman.podman_container:
    pod: assisted-service
    network: host
    env_file: /opt/assisted-service/onprem-environment
    name: image-service
    image: "{{ assisted_image_service_image }}"
    env:
      DUMMY_IGNITION: False
    volume:
    - /etc/pki/ca-trust/extracted/pem:/etc/pki/ca-trust/extracted/pem:Z
    state: started
